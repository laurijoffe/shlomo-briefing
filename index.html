<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Shlomo Intelligence - April 07, 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Instrument+Sans:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--cream:#f5f0e8;--warm:#ede5d8;--dark:#1a1612;--ink:#2c2620;--muted:#8a7f72;--gold:#c9a84c;--gold-lt:#e8d5a0;--green:#4a7c6b;--border:#d8cfc4;--card-bg:#fdfaf6}
html{scroll-behavior:smooth}
body{background:var(--cream);color:var(--ink);font-family:'Instrument Sans',sans-serif;font-weight:300;min-height:100vh}
header{position:relative;z-index:1;background:var(--dark);color:var(--cream);overflow:hidden}
.header-inner{max-width:1100px;margin:0 auto;padding:52px 60px 44px;display:grid;grid-template-columns:1fr auto;align-items:end;gap:40px}
.header-bg-text{position:absolute;top:-20px;right:-10px;font-family:'Playfair Display',Georgia,serif;font-size:180px;font-weight:700;color:rgba(255,255,255,0.03);line-height:1;user-select:none;pointer-events:none;letter-spacing:-0.05em}
.org-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.35em;color:var(--gold);text-transform:uppercase;margin-bottom:10px;opacity:0;animation:fadeUp 0.5s 0.1s ease forwards}
.site-title{font-family:'Playfair Display',Georgia,serif;font-size:52px;font-weight:400;line-height:1.05;color:var(--cream);opacity:0;animation:fadeUp 0.5s 0.15s ease forwards}
.site-title em{font-style:italic;color:var(--gold)}
.header-date{text-align:right;opacity:0;animation:fadeUp 0.5s 0.2s ease forwards}
.day-name{font-family:'Playfair Display',Georgia,serif;font-size:36px;font-style:italic;color:rgba(245,240,232,0.4);line-height:1;margin-bottom:6px}
.date-full{font-family:'DM Mono',monospace;font-size:12px;letter-spacing:0.15em;color:rgba(245,240,232,0.5)}
.gold-rule{height:3px;background:linear-gradient(90deg,var(--gold) 0%,var(--gold-lt) 50%,transparent 100%)}
.theme-bar{position:relative;z-index:1;background:var(--dark);border-top:1px solid rgba(201,168,76,0.2)}
.theme-inner{max-width:1100px;margin:0 auto;padding:28px 60px;display:flex;align-items:center;gap:20px;opacity:0;animation:fadeUp 0.5s 0.25s ease forwards}
.theme-pill{flex-shrink:0;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.3em;text-transform:uppercase;color:var(--dark);background:var(--gold);padding:4px 10px;border-radius:2px}
.theme-text{font-family:'Playfair Display',Georgia,serif;font-size:18px;font-style:italic;color:rgba(245,240,232,0.75);line-height:1.4}
main{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:52px 60px 80px}
.section-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.35em;text-transform:uppercase;color:var(--muted);margin-bottom:24px;display:flex;align-items:center;gap:12px;opacity:0;animation:fadeUp 0.5s 0.3s ease forwards}
.section-label::after{content:'';flex:1;height:1px;background:var(--border)}
.cards-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:48px}
.card{background:var(--card-bg);border:1px solid var(--border);border-radius:4px;padding:24px;opacity:0;transform:translateY(16px);animation:fadeUp 0.55s ease forwards;transition:box-shadow 0.2s,transform 0.2s;display:flex;flex-direction:column;gap:12px}
.card:hover{box-shadow:0 8px 32px rgba(26,22,18,0.1);transform:translateY(-2px)}
.card-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
.tag{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.2em;font-weight:400;padding:3px 8px;border-radius:2px;text-transform:uppercase}
.source-link{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);text-decoration:none;letter-spacing:0.05em;transition:color 0.15s}
.source-link:hover{color:var(--gold)}
.card h3{font-family:'Playfair Display',Georgia,serif;font-size:17px;font-weight:400;line-height:1.35;color:var(--ink);flex:1}
.summary{font-size:13.5px;line-height:1.65;color:var(--muted);flex:1}
.builders-note{border-top:1px solid var(--border);padding-top:14px;margin-top:auto}
.bn-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.25em;text-transform:uppercase;color:var(--gold);margin-bottom:8px}
.builders-note p{font-size:13px;font-style:italic;color:#5a5248;line-height:1.6}
.teaching{background:var(--dark);border-radius:4px;padding:36px 40px;margin-top:0;opacity:0;animation:fadeUp 0.55s ease forwards;position:relative;overflow:hidden}
.teaching::before{content:'';position:absolute;top:0;left:0;width:100%;height:3px;background:linear-gradient(90deg,var(--green),transparent)}
.teaching-eyebrow{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.3em;text-transform:uppercase;color:var(--green);margin-bottom:14px}
.teaching-concept{font-family:'Playfair Display',Georgia,serif;font-size:26px;font-weight:400;color:var(--cream);margin-bottom:16px;line-height:1.2}
.teaching-body{font-size:15px;line-height:1.75;color:rgba(245,240,232,0.65);max-width:680px}
footer{position:relative;z-index:1;border-top:1px solid var(--border);max-width:1100px;margin:0 auto;padding:24px 60px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.footer-left{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.1em;color:var(--muted)}
.footer-right{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.2em;color:var(--gold);text-transform:uppercase}
@keyframes fadeUp{to{opacity:1;transform:translateY(0)}}
@media(max-width:900px){.cards-grid{grid-template-columns:repeat(2,1fr)}.header-inner{grid-template-columns:1fr;gap:16px;padding:36px 24px 28px}.header-date{text-align:left}.theme-inner,main,footer{padding-left:24px;padding-right:24px}}
@media(max-width:600px){.cards-grid{grid-template-columns:1fr}.site-title{font-size:38px}}
</style>
</head>
<body>
<header>
  <div class="header-bg-text">S</div>
  <div class="header-inner">
    <div>
      <div class="org-label">FAM &middot; Fulton Asset Management</div>
      <h1 class="site-title"><em>Shlomo</em> Intelligence</h1>
    </div>
    <div class="header-date">
      <div class="day-name">Tuesday</div>
      <div class="date-full">April 07, 2026</div>
    </div>
  </div>
</header>
<div class="gold-rule"></div>
<div class="theme-bar">
  <div class="theme-inner">
    <span class="theme-pill">Signal</span>
    <p class="theme-text">Could not parse today's briefing — check the log.</p>
  </div>
</div>
<main>
  <div class="section-label">Yesterday's Intelligence</div>
  <div class="cards-grid"></div>
  <div class="section-label" style="animation-delay:0.32s">Teaching Moment</div>
  
</main>
<footer>
  <span class="footer-left">Shlomo Morning Briefing &middot; Prior day intelligence &middot; Auto-generated</span>
  <span class="footer-right">FAM &middot; Confidential</span>
</footer>
</body>
</html>
