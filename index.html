<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shlomo · Morning Intelligence · March 29, 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0d0d0d;
    --surface:   #141414;
    --border:    #252525;
    --gold:      #c9a84c;
    --gold-dim:  #8a6f2e;
    --text:      #e8e0d0;
    --muted:     #6b6359;
    --accent:    #3a6351;
    --accent-hi: #5a9b7a;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 18px;
    line-height: 1.7;
    min-height: 100vh;
    padding: 0 0 80px;
  }

  /* ── Header ── */
  header {
    border-bottom: 1px solid var(--border);
    padding: 48px 60px 36px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 24px;
    flex-wrap: wrap;
  }

  .logo {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .logo-name {
    font-size: 13px;
    font-family: 'DM Mono', monospace;
    font-weight: 300;
    letter-spacing: 0.25em;
    color: var(--gold);
    text-transform: uppercase;
  }

  .logo-title {
    font-size: 42px;
    font-weight: 300;
    letter-spacing: -0.01em;
    color: var(--text);
    line-height: 1;
  }

  .logo-title em {
    font-style: italic;
    color: var(--gold);
  }

  .header-right {
    text-align: right;
  }

  .date-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .date-value {
    font-size: 15px;
    font-weight: 300;
    color: var(--text);
    font-family: 'DM Mono', monospace;
  }

  /* ── Theme bar ── */
  .theme-bar {
    margin: 0 60px;
    padding: 28px 36px;
    border: 1px solid var(--gold-dim);
    border-radius: 2px;
    margin-top: 40px;
    background: linear-gradient(135deg, rgba(201,168,76,0.06) 0%, transparent 60%);
    position: relative;
    overflow: hidden;
  }

  .theme-bar::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px;
    height: 100%;
    background: var(--gold);
  }

  .theme-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.3em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .theme-text {
    font-size: 22px;
    font-weight: 300;
    font-style: italic;
    color: var(--text);
    line-height: 1.4;
  }

  /* ── Grid ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
    gap: 1px;
    margin: 48px 60px 0;
    border: 1px solid var(--border);
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  /* ── Card ── */
  .card {
    background: var(--surface);
    padding: 32px 28px;
    opacity: 0;
    transform: translateY(12px);
    animation: fadeUp 0.5s ease forwards;
    transition: background 0.2s;
  }

  .card:hover {
    background: #181818;
  }

  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }

  .card-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .card-num {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  .card-source {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--gold-dim);
    letter-spacing: 0.05em;
    text-decoration: none;
    transition: color 0.15s;
  }

  .card-source:hover { color: var(--gold); }

  .card-headline {
    font-size: 20px;
    font-weight: 400;
    line-height: 1.3;
    color: var(--text);
    margin-bottom: 12px;
  }

  .card-summary {
    font-size: 16px;
    font-weight: 300;
    color: #a09880;
    line-height: 1.6;
    margin-bottom: 20px;
  }

  .builders-note {
    border-top: 1px solid var(--border);
    padding-top: 16px;
  }

  .note-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.25em;
    color: var(--accent-hi);
    text-transform: uppercase;
    display: block;
    margin-bottom: 8px;
  }

  .builders-note p {
    font-size: 15px;
    font-weight: 300;
    font-style: italic;
    color: #b8c4bc;
    line-height: 1.55;
  }

  /* ── Footer ── */
  footer {
    margin: 60px 60px 0;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }

  .footer-text {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  .footer-mark {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--gold-dim);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  /* ── Empty state ── */
  .empty {
    grid-column: 1 / -1;
    padding: 60px;
    text-align: center;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.1em;
  }

  @media (max-width: 700px) {
    header, .theme-bar, .grid, footer { margin-left: 20px; margin-right: 20px; }
    header { padding: 32px 20px 24px; }
    .logo-title { font-size: 32px; }
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-name">FAM · Fulton Asset Management</span>
    <h1 class="logo-title"><em>Shlomo</em> Intelligence</h1>
  </div>
  <div class="header-right">
    <div class="date-label">Morning Briefing</div>
    <div class="date-value">March 29, 2026</div>
  </div>
</header>

<div class="theme-bar">
  <div class="theme-label">Today's Signal</div>
  <p class="theme-text">Could not parse today's briefing — check the log.</p>
</div>

<div class="grid">
  <div class="empty">No items found — try running again.</div>
</div>

<footer>
  <span class="footer-text">Powered by Shlomo Agent · Prior day intelligence</span>
  <span class="footer-mark">FAM · Confidential</span>
</footer>

</body>
</html>
